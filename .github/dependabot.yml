version: 2

updates:
  # Dependencias npm (frontend + backend monorepo)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Mexico_City"
    open-pull-requests-limit: 10
    target-branch: "main"
    labels:
      - "dependencies"
      - "npm"
    groups:
      # Actualizar todos los paquetes @radix-ui/* juntos
      radix-ui:
        patterns:
          - "@radix-ui/*"
        update-types:
          - "minor"
          - "patch"
      # Actualizar paquetes de testing juntos
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "supertest"
          - "@types/supertest"
          - "jsdom"
        update-types:
          - "minor"
          - "patch"
      # Actualizar tipos de TypeScript juntos
      typescript-types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Evitar actualizaciones major de React hasta validación manual
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      # Evitar actualizaciones major de Express hasta validación manual
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      # Evitar actualizaciones major de Drizzle hasta validación manual
      - dependency-name: "drizzle-orm"
        update-types: ["version-update:semver-major"]
      - dependency-name: "drizzle-kit"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    reviewers:
      - "soreviv"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "America/Mexico_City"
    open-pull-requests-limit: 5
    target-branch: "main"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"
    reviewers:
      - "soreviv"
